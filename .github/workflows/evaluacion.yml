
name: Evaluación automática (Avanzada + IA)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:
    inputs:
      min_commits:
        description: "Mínimo de commits esperados"
        required: false
        default: "3"
      required_files:
        description: "Archivos obligatorios separados por coma"
        required: false
        default: "README.md,reflexion-6-1.md"

jobs:
  evaluar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar evaluación
        env:
          MIN_COMMITS: ${{ github.event.inputs.min_commits || '3' }}
          REQUIRED_FILES: ${{ github.event.inputs.required_files || 'README.md,reflexion-6-1.md' }}
        run: |
          python tools/evaluar_repo.py             --repo-root .             --min-commits "$MIN_COMMITS"             --required "$REQUIRED_FILES"             --outdir reportes

      - name: Resumen en Job Summary
        if: always()
        run: |
          echo "### Informe de evaluación" >> $GITHUB_STEP_SUMMARY
          echo "Repositorio: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Ejecutado por: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat reportes/informe.md >> $GITHUB_STEP_SUMMARY

      - name: Publicar artifacts evaluación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: informe-evaluacion
          path: |
            reportes/informe.md
            reportes/informe.json
            reportes/metricas.csv
            reportes/arbol.txt

  ia:
    name: Redactar retro con IA
    needs: evaluar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar artifacts del job de evaluación
        uses: actions/download-artifact@v4
        with:
          name: informe-evaluacion
          path: reportes

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias mínimas
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-docx requests

      - name: Ejecutar redacción con IA
        env:
          # Azure OpenAI (preferido)
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          # OpenAI estándar (alternativa)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python tools/ai_redactor.py

      - name: Publicar artifacts IA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retroalimentacion-ia
          path: |
            reportes/retro.md
            reportes/retro.docx

      - name: Resumen IA (Job Summary)
        if: always()
        run: |
          echo "## Retroalimentación generada por IA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          sed -n '1,120p' reportes/retro.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_(Descarga el DOCX completo en artifacts.)_" >> $GITHUB_STEP_SUMMARY
